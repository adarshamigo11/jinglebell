<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Trading Platform - Preview</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #1a1d23;
            --panel: #252930;
            --panel-alt: #2a2e39;
            --border: #2f3440;
            --text: #d1d4dc;
            --text-dim: #787b86;
            --green: #26a69a;
            --red: #ef5350;
            --blue: #2962ff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        
        .logo span { color: var(--blue); }
        
        .header-info {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-dim);
        }
        
        .header-info .live {
            color: var(--green);
            font-weight: 600;
        }
        
        /* Main Layout */
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            height: calc(100vh - 56px);
        }
        
        /* Left Panel - Instruments */
        .instruments-panel {
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .search-box {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--blue);
        }
        
        .category-dropdown {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .dropdown-select {
            width: 100%;
            padding: 8px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
        }
        
        .instruments-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .instrument-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .instrument-item:hover {
            background: var(--panel-alt);
        }
        
        .instrument-item.active {
            background: rgba(41, 98, 255, 0.1);
            border-left: 3px solid var(--blue);
        }
        
        .instrument-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .flag-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .instrument-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .instrument-full-name {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .instrument-prices {
            text-align: right;
        }
        
        .bid-price {
            font-weight: 600;
            font-size: 14px;
        }
        
        .ask-price {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .price-up { color: var(--green); }
        .price-down { color: var(--red); }
        
        /* Center Panel - Chart */
        .chart-panel {
            display: flex;
            flex-direction: column;
        }
        
        .chart-header {
            padding: 16px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chart-symbol {
            font-size: 24px;
            font-weight: 700;
        }
        
        .chart-price-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .price-display {
            font-size: 20px;
            font-weight: 600;
        }
        
        .price-change {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .change-positive {
            background: rgba(38, 166, 154, 0.2);
            color: var(--green);
        }
        
        .change-negative {
            background: rgba(239, 83, 80, 0.2);
            color: var(--red);
        }
        
        .chart-controls {
            padding: 12px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .timeframe-btn, .chart-type-btn {
            padding: 6px 12px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .timeframe-btn:hover, .chart-type-btn:hover {
            background: var(--border);
        }
        
        .timeframe-btn.active, .chart-type-btn.active {
            background: var(--blue);
            border-color: var(--blue);
        }
        
        .separator {
            width: 1px;
            height: 24px;
            background: var(--border);
        }
        
        #chartContainer {
            flex: 1;
            background: var(--bg);
        }
        
        /* Right Panel - Order Form */
        .order-panel {
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .order-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        
        .order-tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }
        
        .order-form {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--blue);
        }
        
        .tpsl-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .vol-btn {
            width: 32px;
            height: 32px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .vol-btn:hover {
            background: var(--border);
        }
        
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }
        
        .trade-btn {
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .sell-btn {
            background: var(--red);
            color: #fff;
        }
        
        .sell-btn:hover {
            background: #d32f2f;
        }
        
        .buy-btn {
            background: var(--green);
            color: #fff;
        }
        
        .buy-btn:hover {
            background: #1e8e7e;
        }
        
        /* Positions Panel */
        .positions-panel {
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 16px;
            height: 200px;
            overflow-y: auto;
        }
        
        .positions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .positions-tabs {
            display: flex;
            gap: 12px;
        }
        
        .pos-tab {
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 8px;
        }
        
        .pos-tab.active {
            color: var(--text);
            font-weight: 600;
        }
        
        .no-positions {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--panel);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .instruments-panel, .order-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">Alpha<span>Numeric</span> Trading</div>
        <div class="header-info">
            <span class="live"><i class="fas fa-circle"></i> LIVE PREVIEW</span>
            <span><i class="fas fa-database"></i> Demo Mode</span>
            <span><i class="fas fa-clock"></i> <span id="currentTime"></span></span>
        </div>
    </div>
    
    <!-- Main Layout -->
    <div class="layout">
        <!-- Left: Instruments -->
        <div class="instruments-panel">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search instruments...">
            </div>
            <div class="category-dropdown">
                <select class="dropdown-select" id="categorySelect">
                    <option value="all">All Instruments</option>
                    <option value="major">Major Pairs</option>
                    <option value="crypto">Cryptocurrency</option>
                    <option value="metals">Metals</option>
                    <option value="indices">Indices</option>
                </select>
            </div>
            <div class="instruments-list" id="instrumentsList">
                <!-- Instruments will be populated by JS -->
            </div>
        </div>
        
        <!-- Center: Chart -->
        <div class="chart-panel">
            <div class="chart-header">
                <div>
                    <div class="chart-symbol" id="chartSymbol">EUR/USD</div>
                    <div style="font-size: 12px; color: var(--text-dim);">Euro vs US Dollar</div>
                </div>
                <div class="chart-price-info">
                    <div class="price-display" id="currentPrice">1.08450</div>
                    <div class="price-change change-positive" id="priceChange">+0.12%</div>
                </div>
            </div>
            
            <div class="chart-controls">
                <button class="timeframe-btn active" data-tf="1">1m</button>
                <button class="timeframe-btn" data-tf="5">5m</button>
                <button class="timeframe-btn" data-tf="15">15m</button>
                <button class="timeframe-btn" data-tf="60">1H</button>
                <button class="timeframe-btn" data-tf="240">4H</button>
                <button class="timeframe-btn" data-tf="1440">1D</button>
                <div class="separator"></div>
                <button class="chart-type-btn active" data-type="candles">Candles</button>
                <button class="chart-type-btn" data-type="line">Line</button>
                <button class="chart-type-btn" data-type="area">Area</button>
            </div>
            
            <div id="chartContainer"></div>
            
            <!-- Positions -->
            <div class="positions-panel">
                <div class="positions-header">
                    <div class="positions-tabs">
                        <span class="pos-tab active">Open (0)</span>
                        <span class="pos-tab">Pending (0)</span>
                        <span class="pos-tab">Closed (0)</span>
                    </div>
                    <button style="padding: 6px 12px; background: var(--blue); color: #fff; border: none; border-radius: 4px; cursor: pointer;">
                        <i class="fas fa-plus"></i> New Order
                    </button>
                </div>
                <div class="no-positions">
                    <i class="fas fa-chart-line" style="font-size: 48px; margin-bottom: 12px;"></i>
                    <div>No open positions</div>
                    <div style="font-size: 12px; margin-top: 4px;">Place your first trade to get started</div>
                </div>
            </div>
        </div>
        
        <!-- Right: Order Form -->
        <div class="order-panel">
            <div class="order-tabs">
                <div class="order-tab active">Market</div>
                <div class="order-tab">Pending</div>
            </div>
            <div class="order-form">
                <div class="form-group">
                    <label class="form-label">Volume (Lots)</label>
                    <div class="volume-control">
                        <button class="vol-btn" onclick="adjustVolume(-0.01)">−</button>
                        <input type="number" class="form-input" id="volumeInput" value="0.10" step="0.01" min="0.01">
                        <button class="vol-btn" onclick="adjustVolume(0.01)">+</button>
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="tpEnabled">
                    <label for="tpEnabled">Take Profit</label>
                </div>
                <div class="form-group" id="tpGroup" style="display: none;">
                    <input type="number" class="form-input" id="tpInput" placeholder="Take Profit price" step="any">
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="slEnabled">
                    <label for="slEnabled">Stop Loss</label>
                </div>
                <div class="form-group" id="slGroup" style="display: none;">
                    <input type="number" class="form-input" id="slInput" placeholder="Stop Loss price" step="any">
                </div>
                
                <div style="padding: 12px; background: var(--panel-alt); border-radius: 6px; margin-top: 16px;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px;">
                        <span style="color: var(--text-dim);">Spread:</span>
                        <span id="spreadDisplay">1.2 pips</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span style="color: var(--text-dim);">Margin Required:</span>
                        <span id="marginDisplay">$108.45</span>
                    </div>
                </div>
                
                <div class="trade-buttons">
                    <button class="trade-btn sell-btn" onclick="placeOrder('SELL')">
                        <div style="font-size: 11px;">SELL</div>
                        <div id="sellPrice" style="font-size: 16px;">1.08448</div>
                    </button>
                    <button class="trade-btn buy-btn" onclick="placeOrder('BUY')">
                        <div style="font-size: 11px;">BUY</div>
                        <div id="buyPrice" style="font-size: 16px;">1.08452</div>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Mock forex data
        const forexPairs = [
            { symbol: 'EURUSD', name: 'Euro / US Dollar', category: 'major', bid: 1.08448, ask: 1.08452, change: 0.12, flags: ['eu', 'us'] },
            { symbol: 'GBPUSD', name: 'British Pound / US Dollar', category: 'major', bid: 1.26777, ask: 1.26783, change: 0.19, flags: ['gb', 'us'] },
            { symbol: 'USDJPY', name: 'US Dollar / Japanese Yen', category: 'major', bid: 151.448, ask: 151.452, change: 0.11, flags: ['us', 'jp'] },
            { symbol: 'AUDUSD', name: 'Australian Dollar / US Dollar', category: 'major', bid: 0.65318, ask: 0.65322, change: 0.21, flags: ['au', 'us'] },
            { symbol: 'USDCAD', name: 'US Dollar / Canadian Dollar', category: 'major', bid: 1.36448, ask: 1.36452, change: 0.10, flags: ['us', 'ca'] },
            { symbol: 'BTCUSD', name: 'Bitcoin / US Dollar', category: 'crypto', bid: 67248.50, ask: 67251.50, change: 1.16, flags: ['btc', 'us'] },
            { symbol: 'ETHUSD', name: 'Ethereum / US Dollar', category: 'crypto', bid: 3485.20, ask: 3485.80, change: 1.24, flags: ['eth', 'us'] },
            { symbol: 'XAUUSD', name: 'Gold / US Dollar', category: 'metals', bid: 4696.43, ask: 4696.92, change: 0.35, flags: ['xau', 'us'] },
            { symbol: 'XAGUSD', name: 'Silver / US Dollar', category: 'metals', bid: 84.01, ask: 84.05, change: 0.62, flags: ['xag', 'us'] },
            { symbol: 'USTEC', name: 'US Tech 100', category: 'indices', bid: 29105.65, ask: 29108.05, change: 0.64, flags: ['us', 'us'] }
        ];
        
        let selectedPair = forexPairs[0];
        let chart, candleSeries, lineSeries, areaSeries;
        
        // Initialize
        function init() {
            renderInstruments();
            initChart();
            generateCandleData();
            updateClock();
            setInterval(updateClock, 1000);
            setInterval(simulatePriceUpdates, 3000);
            
            // Event listeners
            document.getElementById('tpEnabled').addEventListener('change', (e) => {
                document.getElementById('tpGroup').style.display = e.target.checked ? 'block' : 'none';
            });
            
            document.getElementById('slEnabled').addEventListener('change', (e) => {
                document.getElementById('slGroup').style.display = e.target.checked ? 'block' : 'none';
            });
            
            document.getElementById('searchInput').addEventListener('input', filterInstruments);
            document.getElementById('categorySelect').addEventListener('change', filterInstruments);
        }
        
        // Render instruments list
        function renderInstruments() {
            const list = document.getElementById('instrumentsList');
            list.innerHTML = forexPairs.map(pair => `
                <div class="instrument-item ${pair.symbol === selectedPair.symbol ? 'active' : ''}" onclick="selectPair('${pair.symbol}')">
                    <div class="instrument-info">
                        <img src="https://flagcdn.com/w40/${pair.flags[0]}.png" class="flag-icon" alt="${pair.flags[0]}">
                        <div>
                            <div class="instrument-name">${pair.symbol}</div>
                            <div class="instrument-full-name">${pair.name}</div>
                        </div>
                    </div>
                    <div class="instrument-prices">
                        <div class="bid-price ${pair.change >= 0 ? 'price-up' : 'price-down'}">${pair.bid.toFixed(pair.bid > 100 ? 2 : 5)}</div>
                        <div class="ask-price">Ask: ${pair.ask.toFixed(pair.ask > 100 ? 2 : 5)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // Filter instruments
        function filterInstruments() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categorySelect').value;
            
            const items = document.querySelectorAll('.instrument-item');
            items.forEach((item, index) => {
                const pair = forexPairs[index];
                const matchSearch = pair.symbol.toLowerCase().includes(search) || pair.name.toLowerCase().includes(search);
                const matchCategory = category === 'all' || pair.category === category;
                item.style.display = matchSearch && matchCategory ? 'flex' : 'none';
            });
        }
        
        // Select trading pair
        function selectPair(symbol) {
            selectedPair = forexPairs.find(p => p.symbol === symbol);
            renderInstruments();
            updateChartHeader();
            generateCandleData();
        }
        
        // Update chart header
        function updateChartHeader() {
            document.getElementById('chartSymbol').textContent = selectedPair.symbol.replace(/([A-Z])/g, ' $1').trim();
            document.getElementById('currentPrice').textContent = selectedPair.bid.toFixed(selectedPair.bid > 100 ? 2 : 5);
            
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = `${selectedPair.change >= 0 ? '+' : ''}${selectedPair.change.toFixed(2)}%`;
            changeEl.className = `price-change ${selectedPair.change >= 0 ? 'change-positive' : 'change-negative'}`;
            
            document.getElementById('sellPrice').textContent = selectedPair.bid.toFixed(selectedPair.bid > 100 ? 2 : 5);
            document.getElementById('buyPrice').textContent = selectedPair.ask.toFixed(selectedPair.ask > 100 ? 2 : 5);
            document.getElementById('spreadDisplay').textContent = ((selectedPair.ask - selectedPair.bid) * 10000).toFixed(1) + ' pips';
        }
        
        // Initialize TradingView chart
        function initChart() {
            const container = document.getElementById('chartContainer');
            chart = LightweightCharts.createChart(container, {
                layout: {
                    background: { type: 'solid', color: '#1a1d23' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#2a2e39' },
                    horzLines: { color: '#2a2e39' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: {
                    borderColor: '#2f3440',
                    timeVisible: true,
                    secondsVisible: false,
                },
                rightPriceScale: {
                    borderColor: '#2f3440',
                },
            });
            
            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderUpColor: '#26a69a',
                borderDownColor: '#ef5350',
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });
            
            chart.timeScale().fitContent();
            
            // Resize handler
            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== container) { return; }
                const newRect = entries[0].contentRect;
                chart.applyOptions({ height: newRect.height, width: newRect.width });
            }).observe(container);
        }
        
        // Generate mock candle data
        function generateCandleData() {
            const data = [];
            let price = selectedPair.bid;
            const now = new Date();
            
            for (let i = 200; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 60000);
                const volatility = price * 0.001;
                
                const open = price;
                const close = open + (Math.random() - 0.5) * volatility * 2;
                const high = Math.max(open, close) + Math.random() * volatility;
                const low = Math.min(open, close) - Math.random() * volatility;
                
                data.push({
                    time: time.getTime() / 1000,
                    open: open,
                    high: high,
                    low: low,
                    close: close
                });
                
                price = close;
            }
            
            candleSeries.setData(data);
            chart.timeScale().fitContent();
        }
        
        // Simulate live price updates
        function simulatePriceUpdates() {
            forexPairs.forEach(pair => {
                const change = (Math.random() - 0.5) * pair.bid * 0.0005;
                pair.bid += change;
                pair.ask = pair.bid + (pair.ask - pair.bid);
            });
            
            if (selectedPair) {
                document.getElementById('currentPrice').textContent = selectedPair.bid.toFixed(selectedPair.bid > 100 ? 2 : 5);
                document.getElementById('sellPrice').textContent = selectedPair.bid.toFixed(selectedPair.bid > 100 ? 2 : 5);
                document.getElementById('buyPrice').textContent = selectedPair.ask.toFixed(selectedPair.ask > 100 ? 2 : 5);
            }
            
            renderInstruments();
        }
        
        // Adjust volume
        function adjustVolume(delta) {
            const input = document.getElementById('volumeInput');
            let value = parseFloat(input.value) + delta;
            value = Math.max(0.01, Math.round(value * 100) / 100);
            input.value = value.toFixed(2);
        }
        
        // Place order (demo)
        function placeOrder(type) {
            alert(`${type} order placed for ${selectedPair.symbol}!\n\nThis is a demo preview. In the full version, this connects to the database.`);
        }
        
        // Update clock
        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString();
        }
        
        // Initialize app
        init();
    </script>
</body>
</html>
